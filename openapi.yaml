openapi: 3.1.0
info:
  title: Dokal Backend API
  version: 1.0.0
  description: >
    API REST Dokal (Express + Supabase). Authentification via JWT Supabase
    envoyé en header `Authorization: Bearer <token>`.

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://dokal-backend.onrender.com
    description: Production (Render)

tags:
  - name: Healthcheck
  - name: Profile
  - name: Relatives
  - name: Practitioners
  - name: Organizations
    description: Clinics & independent practitioner organizations
  - name: Appointments
  - name: Messaging
  - name: Health
  - name: Notifications
  - name: Settings
  - name: Payments
  - name: Subscription
  - name: Reviews
  - name: CRM
  - name: Places
    description: Google Places autocomplete & details (adresses pour app mobile patients)

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Healthcheck]
      security: []
      summary: Healthcheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /api/v1/profile:
    get:
      tags: [Profile]
      summary: Get my profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    patch:
      tags: [Profile]
      summary: Update my profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProfileRequest" }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/account:
    delete:
      tags: [Account]
      summary: Delete my account (hard delete)
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/profile/avatar:
    post:
      tags: [Profile]
      summary: Upload avatar (Storage + mise à jour profiles.avatar_url)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
              required: [avatar]
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Profile]
      summary: Supprimer l'avatar (Storage + profiles.avatar_url = null)
      responses:
        "200":
          description: Profil mis à jour
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/relatives:
    get:
      tags: [Relatives]
      summary: List my relatives
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Relative" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Relatives]
      summary: Add a relative
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddRelativeRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Relative" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/relatives/{id}:
    patch:
      tags: [Relatives]
      summary: Update a relative
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddRelativeRequest" }
      responses:
        "200":
          description: Updated relative
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Relative" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Relatives]
      summary: Delete a relative
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/relatives/{id}/avatar:
    post:
      tags: [Relatives]
      summary: Upload avatar for a relative
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
              required: [avatar]
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatar_url: { type: string, format: uri }
                required: [avatar_url]
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/practitioners/search:
    get:
      tags: [Practitioners]
      security: []
      summary: Search practitioners
      description: |
        Recherche de praticiens par texte (q, city, specialty) ou par distance (lat, lng).
        Si lat et lng sont fournis, les résultats sont triés par distance (PostGIS) et incluent distance_km.
        lat et lng doivent être fournis ensemble, sinon 400.
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Recherche texte (ville, about)
        - name: specialty
          in: query
          schema: { type: string, format: uuid }
          description: UUID de la spécialité
        - name: city
          in: query
          schema: { type: string }
          description: Filtre par ville
        - name: lat
          in: query
          schema: { type: number }
          description: "Latitude patient (recherche par distance). Doit être fourni avec lng."
        - name: lng
          in: query
          schema: { type: number }
          description: "Longitude patient (recherche par distance). Doit être fourni avec lat."
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
          description: Nombre max de résultats
      responses:
        "200":
          description: Liste de praticiens (triés par distance si lat/lng fournis)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PractitionerSearchResult" }
        "400":
          description: "lat et lng doivent être fournis ensemble"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/practitioners/me:
    get:
      tags: [Practitioners]
      summary: Get current user's practitioner profile (authenticated)
      description: |
        Use after POST /practitioners/register to get the practitioner without knowing the id.
        Returns 404 if the user has no practitioner row yet (onboarding not completed).
        When 200, includes is_complete and missing_fields for profile completion tracking.
      responses:
        "200":
          description: Practitioner profile (same shape as GET /practitioners/{id})
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PractitionerDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: No practitioner profile for this user (complete onboarding first)

  /api/v1/practitioners/{id}:
    get:
      tags: [Practitioners]
      security: []
      summary: Get practitioner full profile (includes reasons, instructions, slots, reviews)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Practitioner profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PractitionerDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/practitioners/{id}/slots:
    get:
      tags: [Practitioners]
      security: []
      summary: Get available slots for a practitioner
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: Slots
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Slot" }

  /api/v1/practitioners/{id}/reviews/summary:
    get:
      tags: [Practitioners]
      security: []
      summary: Get practitioner average rating (from patient reviews)
      description: >
        Returns the average rating and total count of reviews for a practitioner.
        Used by the mobile app to display the practitioner's rating summary.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Rating summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  average_rating:
                    type: number
                    nullable: true
                    description: "Note moyenne (1-5), null si aucune review"
                  count:
                    type: integer
                    description: Nombre total de reviews
                required: [average_rating, count]

  /api/v1/practitioners/{id}/reviews:
    get:
      tags: [Practitioners]
      security: []
      summary: Get practitioner reviews (paginated)
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Reviews page
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items: { $ref: "#/components/schemas/Review" }
                  total: { type: integer }
                required: [reviews, total]

  /api/v1/practitioners/register:
    post:
      tags: [Practitioners]
      summary: Register as practitioner (optionally join or create organization)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterPractitionerRequest" }
      responses:
        "201":
          description: Created practitioner
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "200":
          description: Updated practitioner (idempotent retry)
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Organizations ──────────────────────────────────────────────────────

  /api/v1/organizations/search:
    get:
      tags: [Organizations]
      security: []
      summary: Search organizations (clinics / independent)
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { $ref: "#/components/schemas/OrganizationType" }
        - name: city
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        "200":
          description: Results
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Organization" }

  /api/v1/organizations/{id}:
    get:
      tags: [Organizations]
      security: []
      summary: Get organization details (with practitioners)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrganizationDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Organizations]
      summary: Update organization (owner/admin only)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateOrganizationRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/organizations:
    get:
      tags: [Organizations]
      summary: List my organizations
      responses:
        "200":
          description: Organizations I belong to
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - { $ref: "#/components/schemas/Organization" }
                    - type: object
                      properties:
                        my_role: { $ref: "#/components/schemas/OrganizationRole" }
                        joined_at: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Organizations]
      summary: Create organization (clinic or individual)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOrganizationRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/organizations/{id}/members:
    get:
      tags: [Organizations]
      summary: List organization members (with profile + specialty)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OrganizationMemberDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Organizations]
      summary: Add existing user as member (owner/admin only)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string, format: uuid }
                role:
                  type: string
                  enum: [admin, member]
                  default: member
              required: [user_id]
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Already a member
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/organizations/{id}/members/{memberId}:
    patch:
      tags: [Organizations]
      summary: Update member role (owner/admin only)
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/MemberIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [admin, member]
              required: [role]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Organizations]
      summary: Remove member (owner/admin only, cannot remove owner)
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/MemberIdParam"
      responses:
        "204": { description: Removed }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/organizations/{id}/invite:
    post:
      tags: [Organizations]
      summary: >
        Invite a team member (creates Supabase user + practitioner or secretary).
        Sends invite email if new user.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InviteMemberRequest" }
      responses:
        "201":
          description: Member invited/added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteMemberResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: User already a member
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/organizations/{id}/stats:
    get:
      tags: [Organizations]
      summary: Organization-level appointment statistics
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  appointments:
                    type: object
                    properties:
                      total: { type: integer }
                      pending: { type: integer }
                      confirmed: { type: integer }
                      cancelled: { type: integer }
                      completed: { type: integer }
                      no_show: { type: integer }
                  practitioners_count: { type: integer }
                  active_practitioners: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/appointments:
    post:
      tags: [Appointments]
      summary: Create appointment (booking)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAppointmentRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                required: [id]
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/appointments/upcoming:
    get:
      tags: [Appointments]
      summary: List upcoming appointments
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/appointments/past:
    get:
      tags: [Appointments]
      summary: List past appointments
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/appointments/{id}:
    get:
      tags: [Appointments]
      summary: Get appointment by id
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: >
            Appointment complet. Inclut conversation_id, les instructions pré-visite du praticien,
            les champs du questionnaire et le statut de soumission.
          content:
            application/json:
              schema:
                allOf:
                  - { type: object, additionalProperties: true }
                  - type: object
                    properties:
                      conversation_id:
                        type: string
                        format: uuid
                        nullable: true
                      pre_visit_instructions:
                        type: array
                        description: Instructions pré-visite définies par le praticien (actives, triées).
                        items: { type: string }
                        example: ["Apportez une pièce d'identité", "Arrivez 10 minutes en avance"]
                      questionnaire_fields:
                        type: array
                        description: Champs du questionnaire configurés par le praticien pour ce RDV.
                        items:
                          type: object
                          required: [id, label, required]
                          properties:
                            id: { type: string, example: symptoms }
                            label: { type: string, example: "Reason / symptoms" }
                            label_fr: { type: string, example: "Motif / symptômes" }
                            label_he: { type: string, example: "סיבה / תסמינים" }
                            required: { type: boolean }
                            max_lines: { type: integer, example: 3 }
                      questionnaire_submitted_at:
                        type: string
                        format: date-time
                        nullable: true
                        description: Date de soumission du questionnaire par le patient, null si non soumis.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/appointments/{id}/questionnaire:
    post:
      tags: [Appointments]
      summary: Soumettre les réponses au questionnaire pré-visite (patient)
      description: >
        Le patient soumet ses réponses au questionnaire configuré par le praticien.
        Met à jour `appointment_questionnaires.answers` et `completed_at`.
        Idempotent : peut être resoumis (écrase les réponses précédentes).
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [consent, answers]
              properties:
                consent:
                  type: boolean
                  enum: [true]
                  description: Le patient doit explicitement consentir (doit être true).
                answers:
                  type: object
                  additionalProperties: { type: string }
                  description: Dictionnaire field_id → réponse textuelle.
                  example:
                    symptoms: "Maux de tête depuis 3 jours"
                    allergies: "Aucune"
      responses:
        "204": { description: Réponses enregistrées }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/appointments/{id}/instructions/read:
    post:
      tags: [Appointments]
      summary: Marquer les instructions pré-visite comme lues (patient)
      description: >
        Traçabilité optionnelle — indique que le patient a consulté les instructions.
        Retourne toujours 204 même si déjà marqué.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204": { description: Marqué comme lu }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/appointments/{id}/cancel:
    patch:
      tags: [Appointments]
      summary: Cancel appointment (patient)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cancellation_reason: { type: string, nullable: true }
      responses:
        "204": { description: Cancelled }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/appointments/{id}/reschedule:
    patch:
      tags: [Appointments]
      summary: Reschedule appointment (patient)
      description: >
        Replanifie un rendez-vous. Le créneau doit être disponible (vérifié via les slots du praticien).
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RescheduleAppointmentRequest" }
      responses:
        "200":
          description: Rendez-vous replanifié (même structure que GET /api/v1/appointments/{id})
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/conversations:
