          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /api/v1/payments/methods:
    get:
      tags: [Payments]
      summary: List payment methods
      responses:
        "200":
          description: Methods
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PaymentMethod" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Payments]
      summary: Add payment method (stored in DB; tokenization handled by PayMe flow)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddPaymentMethodRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaymentMethod" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/payments/methods/{id}:
    delete:
      tags: [Payments]
      summary: Remove payment method
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/payments/methods/{id}/default:
    patch:
      tags: [Payments]
      summary: Set payment method as default
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204": { description: Updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/payments/create-link:
    post:
      tags: [Payments]
      summary: Generate a PayMe payment link
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GeneratePaymentLinkRequest" }
      responses:
        "200":
          description: PayMe response (includes payment_url if success)
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/reviews:
    post:
      tags: [Reviews]
      summary: Create review (patient)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateReviewRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Review" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/reviews/{id}/reply:
    patch:
      tags: [Reviews]
      summary: Reply to a review (practitioner)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                practitioner_reply: { type: string, minLength: 1 }
              required: [practitioner_reply]
      responses:
        "204": { description: Updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/crm/auth/bootstrap:
    post:
      tags: [CRM]
      summary: Bootstrap CRM profile after OAuth signup (creates/updates profiles.role)
      parameters:
        - name: X-Client-App
          in: header
          required: false
          description: Optional client guard (recommended value is `crm`)
          schema: { type: string }
      responses:
        "200":
          description: Profile (same format as GET /api/v1/profile)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/crm/dashboard/stats:
    get:
      tags: [CRM]
      summary: CRM stats (practitioner/secretary/admin — secretaries see org-level stats)
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending: { type: integer }
                  confirmed: { type: integer }
                  cancelled: { type: integer }
                  completed: { type: integer }
                  no_show: { type: integer }
                required: [pending, confirmed, cancelled, completed, no_show]
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/crm/appointments:
    get:
      tags: [CRM]
      summary: CRM appointments list (practitioner sees own, secretary sees org-level)
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date }
        - name: status
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Page
          content:
            application/json:
              schema:
                type: object
                properties:
                  appointments:
                    type: array
                    items: { type: object, additionalProperties: true }
                  total: { type: integer }
                required: [appointments, total]
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [CRM]
      summary: Create a CRM appointment (confirmed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                patient_record_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Existing CRM patient record id
                patient:
                  type: object
                  nullable: true
                  description: Inline patient creation (draft patient record, no auth)
                  properties:
                    first_name: { type: string }
                    last_name: { type: string }
                    phone: { type: string, nullable: true }
                    email: { type: string, format: email, nullable: true }
                    teudat_zehut: { type: string, nullable: true }
                    date_of_birth: { type: string, format: date, nullable: true }
                    sex: { type: string, nullable: true }
                    city: { type: string, nullable: true }
                practitioner_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Required if the actor is a secretary/admin
                reason_id: { type: string, format: uuid, nullable: true }
                appointment_date: { type: string, format: date }
                start_time: { type: string, example: "09:00:00" }
                end_time: { type: string, example: "09:30:00" }
                visited_before: { type: boolean }
                status: { type: string, enum: ["confirmed"] }
                notes: { type: string, nullable: true }
              required:
                - reason_id
                - appointment_date
                - start_time
                - end_time
                - visited_before
                - status
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                required: [id]
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/crm/appointments/{id}:
    get:
      tags: [CRM]
      summary: Get appointment by ID (CRM)
      description: >
        Returns the full appointment for the practitioner or secretary/admin.
        Includes pre_visit_instructions, questionnaire_fields, questionnaire_answers
        and questionnaire_submitted_at when configured/submitted.
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200":
          description: Appointment details (includes questionnaire data)
          content:
            application/json:
              schema:
                allOf:
                  - { type: object, additionalProperties: true }
                  - type: object
                    properties:
                      pre_visit_instructions:
                        type: array
                        items: { type: string }
                        description: "Pre-visit instructions for this appointment"
                      questionnaire_fields:
                        type: array
                        items: { $ref: "#/components/schemas/QuestionnaireField" }
                        description: "Questionnaire fields configured for this appointment"
                      questionnaire_submitted_at:
                        type: string
                        format: date-time
                        nullable: true
                        description: "When the patient submitted the questionnaire"
                      questionnaire_answers:
                        type: object
                        nullable: true
                        additionalProperties: { type: string }
                        description: "Patient answers keyed by questionnaire field id"
                      instructions_read_at:
                        type: string
                        format: date-time
                        nullable: true
                        description: "When the patient marked the instructions as read"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [CRM]
      summary: Update appointment metadata (practitioner only)
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason_id: { type: string, format: uuid, nullable: true }
                practitioner_notes: { type: string, nullable: true }
                external_title: { type: string, nullable: true }
                external_description: { type: string, nullable: true }
                external_location: { type: string, nullable: true }
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/crm/appointments/{id}/confirm:
    patch:
      tags: [CRM]
      summary: Confirm appointment
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "204": { description: Confirmed }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/crm/appointments/{id}/cancel:
    patch:
      tags: [CRM]
      summary: Cancel appointment
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cancellation_reason: { type: string, nullable: true }
      responses:
        "204": { description: Cancelled }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/crm/appointments/{id}/complete:
    patch:
      tags: [CRM]
      summary: Complete appointment
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                practitioner_notes: { type: string, nullable: true }
      responses:
        "204": { description: Completed }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/crm/appointments/{id}/no-show:
    patch:
      tags: [CRM]
      summary: Mark appointment as no-show
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "204": { description: Updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Questionnaire & Pre-visit Instructions ──

  /api/v1/crm/profile/questionnaire-config:
    get:
      tags: [CRM]
      summary: Get practitioner default questionnaire config
      description: >
        Returns the practitioner-level default pre-visit instructions and
        questionnaire fields. These defaults are applied to all new appointments
        unless overridden at the appointment level.
      responses:
        "200":
          description: Questionnaire config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuestionnaireConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    patch:
      tags: [CRM]
      summary: Update practitioner default questionnaire config
      description: >
        Upsert (create or update) the practitioner-level default pre-visit
        instructions and/or questionnaire fields. Partial updates are supported:
        only the fields present in the request body are updated.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateQuestionnaireConfigRequest" }
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuestionnaireConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/crm/appointments/{id}/questionnaire-config:
    patch:
      tags: [CRM]
      summary: Override questionnaire config for a specific appointment
      description: >
        Set or update the pre-visit instructions and/or questionnaire fields
        for a specific appointment, overriding the practitioner defaults.
        The appointment response (GET /crm/appointments/{id}) will include
        the resulting pre_visit_instructions and questionnaire_fields.
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateQuestionnaireConfigRequest" }
      responses:
        "200":
          description: Updated appointment with questionnaire config
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
