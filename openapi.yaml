  # ── Places (Google Places API proxy) ───────────────────────────────────────
  /api/v1/places/autocomplete:
    get:
      tags: [Places]
      security: []
      summary: Autocomplete d'adresses (proxy Google Places)
      description: |
        Retourne des suggestions d'adresses via l'API Google Places.
        Utilisé par l'app mobile patients pour la saisie d'adresse.
      parameters:
        - name: input
          in: query
          required: true
          schema: { type: string }
          description: Texte saisi par l'utilisateur
        - name: country
          in: query
          schema: { type: string, default: il }
          description: Code pays (ex. il pour Israël)
        - name: language
          in: query
          schema: { type: string, default: he }
          description: Code langue (ex. he pour hébreu)
      responses:
        "200":
          description: Liste de prédictions
          content:
            application/json:
              schema:
                type: object
                properties:
                  predictions:
                    type: array
                    items:
                      type: object
                      properties:
                        place_id: { type: string }
                        description: { type: string }
                        main_text: { type: string }
                      required: [place_id, description, main_text]
                required: [predictions]
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
        "503":
          description: Google Places API non configurée
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v1/places/details:
    get:
      tags: [Places]
      security: []
      summary: Détails d'un lieu (proxy Google Place Details)
      description: |
        Retourne les détails d'une adresse à partir d'un place_id.
        Utilisé par l'app mobile patients après sélection d'une suggestion.
      parameters:
        - name: place_id
          in: query
          required: true
          schema: { type: string }
          description: Identifiant Google du lieu (depuis autocomplete)
        - name: language
          in: query
          schema: { type: string }
          description: Code langue (optionnel)
      responses:
        "200":
          description: Détails du lieu
          content:
            application/json:
              schema:
                type: object
                properties:
                  address_line: { type: string }
                  zip_code: { type: string }
                  city: { type: string }
                  formatted_address: { type: string }
                required: [address_line, zip_code, city, formatted_address]
        "400": { $ref: "#/components/responses/BadRequest" }
        "404":
          description: Lieu non trouvé
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
        "503":
          description: Google Places API non configurée
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase access token

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberIdParam:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    InternalServerError:
      description: Internal server error (e.g. OpenAI API failure)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    RateLimitExceeded:
      description: Too many requests (rate limit)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
          required: [code, message]
      required: [error]

    UserRole:
      type: string
      enum: [patient, practitioner, secretary, admin]

    OrganizationType:
      type: string
      enum: [individual, clinic]

    OrganizationRole:
      type: string
      enum: [owner, admin, member]

    StaffType:
      type: string
      enum: [practitioner, secretary]

    SexType:
      type: string
      enum: [male, female, other]

    RelationType:
      type: string
      enum: [child, parent, spouse, sibling, other]

    KupatHolimType:
      type: string
      enum: [clalit, maccabi, meuhedet, leumit, other]
      description: Caisse maladie israélienne (optionnel)

    AppointmentStatus:
      type: string
      enum:
        - pending
        - confirmed
        - cancelled_by_patient
        - cancelled_by_practitioner
        - completed
        - no_show

    MessageType:
      type: string
      enum: [text, image, file, system]

    NotificationType:
      type: string
      enum:
        - appointment_request
        - appointment_confirmed
        - appointment_cancelled
        - appointment_reminder
        - new_message
        - review_received

    Profile:
      type: object
      properties:
        id: { type: string, format: uuid }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        date_of_birth: { type: string, format: date, nullable: true }
        sex: { $ref: "#/components/schemas/SexType", nullable: true }
        city: { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/UserRole" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, role]

    UpdateProfileRequest:
      type: object
      properties:
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string, nullable: true }
        city: { type: string, nullable: true }
        date_of_birth: { type: string, nullable: true }
        sex: { $ref: "#/components/schemas/SexType", nullable: true }
        teudat_zehut:
          type: string
          nullable: true
          pattern: "^(?:\\D*\\d){9}\\D*$"
          description: >
            Teoudat Zehout (Israeli national ID). Stockée dans `health_profiles` (chiffrée) et utilisée pour lier un dossier `patients` si besoin.
            Jamais retournée en clair dans `Profile`.

    Relative:
      type: object
      properties:
        id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        relation: { $ref: "#/components/schemas/RelationType" }
        date_of_birth: { type: string, format: date, nullable: true }
        teudat_zehut: { type: string, nullable: true }
        kupat_holim: { type: string, nullable: true }
        insurance_provider: { type: string, nullable: true }
        avatar_url: { type: string, format: uri, nullable: true }
      required: [id, first_name, last_name, relation]

    AddRelativeRequest:
      type: object
      properties:
        first_name: { type: string, minLength: 1 }
        last_name: { type: string, minLength: 1 }
        teudat_zehut: { type: string, minLength: 9, maxLength: 9 }
        relation: { $ref: "#/components/schemas/RelationType" }
        date_of_birth: { type: string, format: date, nullable: true }
        kupat_holim: { $ref: "#/components/schemas/KupatHolimType", nullable: true }
        insurance_provider: { type: string, nullable: true }
        avatar_url: { type: string, format: uri, nullable: true }
      required: [first_name, last_name, teudat_zehut, date_of_birth, relation]

    Slot:
      type: object
      properties:
        slot_date: { type: string, format: date }
        slot_start: { type: string }
        slot_end: { type: string }
      required: [slot_date, slot_start, slot_end]

    PractitionerSearchResult:
      type: object
      description: >
        Praticien dans les résultats de recherche. Si lat/lng fournis, inclut distance_km.
      properties:
        id: { type: string, format: uuid }
        address_line: { type: string, nullable: true }
        zip_code: { type: string, nullable: true }
        city: { type: string, nullable: true }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        profiles:
          type: object
          properties:
            first_name: { type: string }
            last_name: { type: string }
            avatar_url: { type: string, format: uri, nullable: true }
        specialties:
          type: object
          nullable: true
          properties:
            name: { type: string }
            name_fr: { type: string, nullable: true }
            name_he: { type: string, nullable: true }
        organizations:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            type: { $ref: "#/components/schemas/OrganizationType" }
            avatar_url: { type: string, nullable: true }
        average_rating:
          type: number
          nullable: true
          description: "Note moyenne (1–5), null si aucune review"
        review_count:
          type: integer
          description: "Nombre total de reviews"
        price_min_agorot:
          type: integer
          nullable: true
          description: "Prix min consultation en agorot (ILS × 100)"
        price_max_agorot:
          type: integer
          nullable: true
          description: "Prix max consultation en agorot (ILS × 100)"
        distance_km:
          type: number
          nullable: true
          description: "Distance en km depuis la position du patient (présent uniquement si lat/lng fournis)"
      additionalProperties: true

    PractitionerDetail:
      type: object
      description: >
        Profil praticien complet (reasons, instructions, slots, reviews).
        GET /me inclut is_complete et missing_fields.
      additionalProperties: true
      properties:
        id: { type: string, format: uuid }
        specialty_id: { type: string, format: uuid, nullable: true }
        specialties:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            name_fr: { type: string, nullable: true }
            name_he: { type: string, nullable: true }
        has_teudat_zehut:
          type: boolean
          description: "Indique si le praticien a déjà une Teoudat Zehout enregistrée. Présent uniquement sur GET /practitioners/me."
        teudat_zehut_masked:
          type: string
          nullable: true
          description: "Teoudat Zehout masquée (jamais renvoyée en clair). Présent uniquement sur GET /practitioners/me."
        address_line: { type: string, nullable: true }
        zip_code: { type: string, nullable: true }
        city: { type: string, nullable: true }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        is_complete:
          type: boolean
          description: "Profil complet (tous les champs obligatoires renseignés). Présent uniquement sur GET /me."
        missing_fields:
          type: array
          items: { type: string }
          description: "Champs manquants pour compléter le profil. Présent uniquement sur GET /me."
        price_min_agorot:
          type: integer
          minimum: 0
          nullable: true
          description: "Prix min consultation en agorot (ILS × 100)"
        price_max_agorot:
          type: integer
          minimum: 0
          nullable: true
          description: "Prix max consultation en agorot (ILS × 100)"

    CreateAppointmentRequest:
      type: object
      properties:
        practitioner_id: { type: string, format: uuid }
        relative_id: { type: string, format: uuid, nullable: true }
        reason_id: { type: string, format: uuid, nullable: true }
        appointment_date: { type: string, format: date }
        start_time: { type: string }
        end_time: { type: string }
        patient_address_line: { type: string, nullable: true }
        patient_zip_code: { type: string, nullable: true }
        patient_city: { type: string, nullable: true }
        visited_before: { type: boolean, default: false }
      required: [practitioner_id, appointment_date, start_time, end_time]

    RescheduleAppointmentRequest:
      type: object
      properties:
        appointment_date: { type: string, format: date, description: "YYYY-MM-DD" }
        start_time: { type: string, description: "HH:mm ou HH:mm:ss" }
        end_time: { type: string, description: "HH:mm ou HH:mm:ss" }
      required: [appointment_date, start_time, end_time]

    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        sender_id: { type: string, format: uuid }
        content: { type: string }
        message_type: { $ref: "#/components/schemas/MessageType" }
        is_read: { type: boolean }
        created_at: { type: string, format: date-time }
      required: [id, sender_id, content, message_type, is_read, created_at]

    ConversationListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        last_message_at: { type: string, format: date-time, nullable: true }
        unread_count: { type: integer }
        practitioners:
          type: object
          properties:
            profiles:
              type: object
              properties:
                first_name: { type: string, nullable: true }
                last_name: { type: string, nullable: true }
                avatar_url: { type: string, nullable: true }
        last_message:
          type: object
          nullable: true
          properties:
            content: { type: string }
        appointments:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            status: { type: string }
            appointment_date: { type: string, format: date }

    ConversationDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        practitioners: { type: object }
        is_online: { type: boolean }

    Conversation:
      type: object
      properties:
        id: { type: string, format: uuid }
        patient_id: { type: string, format: uuid }
        practitioner_id: { type: string, format: uuid }
        last_message_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    CreateConversationRequest:
      type: object
      description: Patient envoie practitioner_id, praticien envoie patient_id
      properties:
        practitioner_id: { type: string, format: uuid, description: "Requis si l'appelant est un patient" }
        patient_id: { type: string, format: uuid, description: "Requis si l'appelant est un praticien" }
        subject: { type: string }
        content: { type: string }

    SendMessageRequest:
      type: object
      properties:
        content: { type: string, minLength: 1 }
        message_type:
          type: string
          enum: [text, image, file]
          default: text
      required: [content]

    HealthProfile:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        teudat_zehut: { type: string, nullable: true, description: "Numéro d'identité israélien (déchiffré)" }
        date_of_birth: { type: string, format: date, nullable: true }
        sex: { $ref: "#/components/schemas/SexType", nullable: true }
        blood_type: { type: string, nullable: true }
        kupat_holim: { type: string, nullable: true }
        insurance_provider: { type: string, nullable: true, description: "Assurance privée (AIG, איילון, etc.)" }
        kupat_member_id: { type: string, nullable: true }
        family_doctor_name: { type: string, nullable: true }
        emergency_contact_name: { type: string, nullable: true }
        emergency_contact_phone: { type: string, nullable: true }
        updated_at: { type: string, format: date-time }
      additionalProperties: true

    UpsertHealthProfileRequest:
      type: object
      properties:
        teudat_zehut:
          type: string
          nullable: true
          pattern: "^(?:\\D*\\d){9}\\D*$"
          description: "Teoudat Zehout (9 chiffres). Les séparateurs non numériques sont ignorés."
        date_of_birth: { type: string, nullable: true }
        sex: { $ref: "#/components/schemas/SexType", nullable: true }
        blood_type: { type: string, nullable: true }
        kupat_holim: { type: string, nullable: true }
        insurance_provider: { type: string, nullable: true }
        kupat_member_id: { type: string, nullable: true }
        family_doctor_name: { type: string, nullable: true }
        emergency_contact_name: { type: string, nullable: true }
        emergency_contact_phone: { type: string, nullable: true }

    HealthTable:
      type: string
      enum: [conditions, medications, allergies, vaccinations]

    AddHealthItemRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        reaction: { type: string, nullable: true }
        severity: { type: string, nullable: true }
        dosage: { type: string, nullable: true }
        frequency: { type: string, nullable: true }
        diagnosed_on: { type: string, nullable: true }
        started_on: { type: string, nullable: true }
        ended_on: { type: string, nullable: true }
        dose: { type: string, nullable: true }
        vaccinated_on: { type: string, nullable: true }
        notes: { type: string, nullable: true }
      required: [name]

    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/NotificationType" }
        title: { type: string }
        body: { type: string }
        data: { type: object, additionalProperties: true }
        is_read: { type: boolean }
        created_at: { type: string, format: date-time }
      required: [id, type, title, body, data, is_read, created_at]

    RegisterPushTokenRequest:
      type: object
      properties:
        token: { type: string, minLength: 10 }
        platform:
          type: string
          enum: [ios, android, web]
      required: [token, platform]

    Settings:
      type: object
      properties:
        notifications_enabled: { type: boolean }
        reminders_enabled: { type: boolean }
        locale: { type: string }
      required: [notifications_enabled, reminders_enabled, locale]

    UpdateSettingsRequest:
      type: object
      properties:
        notifications_enabled: { type: boolean }
        reminders_enabled: { type: boolean }
        locale: { type: string, minLength: 2, maxLength: 5 }

    PaymentMethod:
      type: object
      properties:
        id: { type: string, format: uuid }
        brand: { type: string }
        last4: { type: string }
        expiry_month: { type: integer }
        expiry_year: { type: integer }
        is_default: { type: boolean }
      required: [id, brand, last4, expiry_month, expiry_year, is_default]

    AddPaymentMethodRequest:
      type: object
      properties:
        brand: { type: string, minLength: 1 }
        last4: { type: string, minLength: 4, maxLength: 4 }
        expiry_month: { type: integer, minimum: 1, maximum: 12 }
        expiry_year: { type: integer, minimum: 2020, maximum: 2100 }
      required: [brand, last4, expiry_month, expiry_year]

    GeneratePaymentLinkRequest:
      type: object
      properties:
        amount:
          type: integer
          description: Amount in agorot (ILS cents)
          minimum: 1
        description: { type: string, minLength: 1 }
      required: [amount, description]

    Review:
      type: object
      additionalProperties: true

    CreateReviewRequest:
      type: object
      properties:
        appointment_id: { type: string, format: uuid }
        practitioner_id: { type: string, format: uuid }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, nullable: true }
      required: [appointment_id, practitioner_id, rating]

    AddScheduleRequest:
      type: object
      properties:
        day_of_week: { type: integer, minimum: 0, maximum: 6 }
        start_time: { type: string }
        end_time: { type: string }
        slot_duration_minutes: { type: integer, minimum: 5, maximum: 240, default: 30 }
        is_active: { type: boolean, default: true }
      required: [day_of_week, start_time, end_time]

    UpdateScheduleRequest:
      type: object
      properties:
        start_time: { type: string }
        end_time: { type: string }
        slot_duration_minutes: { type: integer, minimum: 5, maximum: 240 }
        is_active: { type: boolean }

    UpsertOverrideRequest:
      type: object
      properties:
        date: { type: string, format: date }
        is_available: { type: boolean }
        start_time: { type: string, nullable: true }
        end_time: { type: string, nullable: true }
        reason: { type: string, nullable: true }
      required: [date, is_available]

    AddReasonRequest:
      type: object
      properties:
        label: { type: string, minLength: 1 }
        label_fr: { type: string, nullable: true }
        label_he: { type: string, nullable: true }
        sort_order: { type: integer, default: 0 }
        is_active: { type: boolean, default: true }
      required: [label]

    UpdateReasonRequest:
      type: object
      properties:
        label: { type: string }
        label_fr: { type: string, nullable: true }
        label_he: { type: string, nullable: true }
        sort_order: { type: integer }
        is_active: { type: boolean }

    AddInstructionRequest:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string, minLength: 1 }
        is_active: { type: boolean, default: true }
        sort_order: { type: integer, default: 0 }
      required: [title, content]

    UpdateInstructionRequest:
      type: object
      properties:
        title: { type: string }
        content: { type: string }
        is_active: { type: boolean }
        sort_order: { type: integer }

    ImproveTextRequest:
      type: object
      properties:
        current_text:
          type: string
          nullable: true
          description: Existing text to improve, or null for generation from scratch

    ImproveTextResponse:
      type: object
      required: [generated]
      properties:
        generated:
          type: string
          description: AI-generated text

    UpdatePractitionerProfileRequest:
      type: object
      description: Mise à jour profil praticien (paramètres CRM). latitude/longitude depuis AddressAutocomplete.
      properties:
        specialty_id: { type: string, format: uuid, description: "UUID de la spécialité" }
        about: { type: string, nullable: true }
        languages:
          type: array
          items: { type: string }
          nullable: true
        education: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        teudat_zehut:
          type: string
          pattern: '^\d{9}$'
          description: "Teoudat Zehout (9 chiffres). Stockée chiffrée + hashée; jamais renvoyée en clair."
        is_accepting_new_patients: { type: boolean }
        address_line: { type: string, nullable: true }
        zip_code: { type: string, nullable: true }
        city: { type: string, nullable: true }
        latitude:
          type: number
          nullable: true
          description: "Latitude (depuis AddressAutocomplete / Place Details)"
        longitude:
          type: number
          nullable: true
          description: "Longitude (depuis AddressAutocomplete / Place Details)"
        price_min_agorot:
          type: integer
          minimum: 0
          nullable: true
          description: "Prix min consultation en agorot (ILS × 100)"
        price_max_agorot:
          type: integer
          minimum: 0
          nullable: true
          description: "Prix max consultation en agorot (ILS × 100)"
        consultation_duration_minutes:
          type: integer
          minimum: 5
          maximum: 240
          description: "Durée d'une consultation en minutes (5-240)"

    RegisterPractitionerRequest:
      type: object
      description: Inscription praticien (complete-profile). latitude/longitude depuis AddressAutocomplete.
      properties:
        first_name: { type: string, minLength: 1 }
        last_name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        phone: { type: string, pattern: '^\+[1-9]\d{1,14}$', description: "Format E.164 (ex: +972501234567)" }
        city: { type: string, minLength: 1 }
        specialty_id: { type: string, format: uuid, description: "UUID de la spécialité" }
        license_number: { type: string, pattern: '^\d{1,6}$', description: "1 à 6 chiffres" }
        specialization_license:
          type: string
          pattern: '^\d{1,6}$'
          nullable: true
          description: "Numéro de licence de spécialité (optionnel)"
        address_line: { type: string, minLength: 1 }
        zip_code: { type: string, minLength: 1 }
        latitude:
          type: number
          nullable: true
          description: "Latitude (depuis AddressAutocomplete / Place Details)"
        longitude:
          type: number
          nullable: true
          description: "Longitude (depuis AddressAutocomplete / Place Details)"
        organization_id:
          type: string
          format: uuid
          description: Rejoindre une organisation existante (optionnel)
        organization_name:
          type: string
          description: Nom pour une nouvelle organisation (optionnel)
        organization_type:
          $ref: "#/components/schemas/OrganizationType"
      required: [first_name, last_name, email, phone, city, specialty_id, license_number, address_line, zip_code]

    # ── Organizations ──────────────────────────────────────────────────

    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string, nullable: true }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        address_line: { type: string, nullable: true }
        zip_code: { type: string, nullable: true }
        city: { type: string, nullable: true }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        avatar_url: { type: string, nullable: true }
        type: { $ref: "#/components/schemas/OrganizationType" }
        license_number: { type: string, nullable: true }
        description: { type: string, nullable: true }
        website: { type: string, nullable: true }
        owner_id: { type: string, format: uuid }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, name, type, owner_id, is_active]

    OrganizationDetail:
      description: Organization with nested practitioners or members
      allOf:
        - { $ref: "#/components/schemas/Organization" }
        - type: object
          properties:
            practitioners:
              type: array
              items: { type: object, additionalProperties: true }
            organization_members:
              type: array
              items: { $ref: "#/components/schemas/OrganizationMemberDetail" }

    OrganizationMemberDetail:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        role: { $ref: "#/components/schemas/OrganizationRole" }
        staff_type: { $ref: "#/components/schemas/StaffType" }
        invited_by: { type: string, format: uuid, nullable: true }
        joined_at: { type: string, format: date-time }
        profiles:
          type: object
          properties:
            first_name: { type: string, nullable: true }
            last_name: { type: string, nullable: true }
            avatar_url: { type: string, nullable: true }
            email: { type: string, nullable: true }
            phone: { type: string, nullable: true }
            role: { $ref: "#/components/schemas/UserRole" }
        practitioner:
          description: >
            Present only when staff_type=practitioner. Contains specialty info.
          type: object
          nullable: true
          properties:
            specialty:
              type: object
              properties:
                name: { type: string }
                name_fr: { type: string, nullable: true }
                name_he: { type: string, nullable: true }
      required: [id, user_id, role, staff_type, joined_at]

    CreateOrganizationRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        type: { $ref: "#/components/schemas/OrganizationType" }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        address_line: { type: string, nullable: true }
        zip_code: { type: string, nullable: true }
        city: { type: string, nullable: true }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        license_number: { type: string, nullable: true }
        description: { type: string, nullable: true }
        website: { type: string, format: uri, nullable: true }
      required: [name]

    UpdateOrganizationRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        address_line: { type: string, nullable: true }
        zip_code: { type: string, nullable: true }
        city: { type: string, nullable: true }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        avatar_url: { type: string, format: uri, nullable: true }
        license_number: { type: string, nullable: true }
        description: { type: string, nullable: true }
        website: { type: string, format: uri, nullable: true }
        is_active: { type: boolean }

    InviteMemberRequest:
      type: object
      description: >
        Invite a new team member. Creates a Supabase user (sends invite email)
        or adds an existing user. For staff_type=practitioner, specialty and
        license_number are required.
      properties:
        email: { type: string, format: email }
        first_name: { type: string, minLength: 1 }
        last_name: { type: string, minLength: 1 }
        phone: { type: string, nullable: true, pattern: '^\+[1-9]\d{1,14}$' }
        staff_type: { $ref: "#/components/schemas/StaffType" }
        org_role:
          type: string
          enum: [admin, member]
          default: member
        specialty:
          type: string
          description: Required when staff_type=practitioner (i18n key or name)
        license_number:
          type: string
          description: Required when staff_type=practitioner
          pattern: '^\d{1,6}$'
        address_line: { type: string, nullable: true }
        zip_code: { type: string, nullable: true }
        city: { type: string, nullable: true }
      required: [email, first_name, last_name, staff_type]

    InviteMemberResponse:
      type: object
      properties:
        member: { $ref: "#/components/schemas/OrganizationMemberDetail" }
        is_existing_user:
          type: boolean
          description: true if the email was already registered
        invite_sent:
          type: boolean
          description: true if an invite email was sent (false for existing users)
      required: [member, is_existing_user, invite_sent]

    # ── Questionnaire & Pre-visit Instructions ──

    QuestionnaireField:
      type: object
      description: >
        A single configurable field in the pre-visit questionnaire.
        Label keys support i18n (label = EN, label_fr = FR, label_he = HE).
      properties:
        id:
          type: string
          description: "Unique slug identifier (lowercase, digits, underscores, e.g. 'symptoms')"
          pattern: '^[a-z0-9_]+$'
          example: symptoms
        label:
          type: string
          description: "Field label in English (default language)"
          example: "Reason / symptoms"
        label_fr:
          type: string
          nullable: true
          description: "Field label in French"
          example: "Motif / symptômes"
        label_he:
          type: string
          nullable: true
          description: "Field label in Hebrew"
          example: "סיבה / תסמינים"
        required:
          type: boolean
          description: "Whether the patient must fill this field"
          default: false
        max_lines:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
          description: "Number of text input lines (1 = single line, 2+ = textarea)"
      required: [id, label, required, max_lines]

    QuestionnaireConfig:
      type: object
      description: >
        Pre-visit instructions (string array) and questionnaire fields
        configured by the practitioner. Used both at profile level (defaults)
        and at appointment level (overrides).
      properties:
        pre_visit_instructions:
          type: array
          items: { type: string }
          description: "Ordered list of instruction texts shown to the patient before the visit"
          example: ["Bring your ID card", "Arrive 10 minutes early", "Fast 4 hours before"]
        questionnaire_fields:
          type: array
          items: { $ref: "#/components/schemas/QuestionnaireField" }
          description: "Ordered list of form fields the patient fills in before the appointment"
      required: [pre_visit_instructions, questionnaire_fields]

    UpdateQuestionnaireConfigRequest:
      type: object
      description: "Partial update for questionnaire config. Only provided fields are updated."
      properties:
        pre_visit_instructions:
          type: array
          items: { type: string }
        questionnaire_fields:
          type: array
          items: { $ref: "#/components/schemas/QuestionnaireField" }
